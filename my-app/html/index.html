<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Chờ Kho Đại Lý Xác Nhận</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2f7f34',
            secondary: '#1e4d20',
            accent: '#0ea5e9',
            disabled: '#9ca3af',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
          }
        }
      }
    }
  </script>
  <style>
    .hero-mesh-gradient {
      background-color: #f8fafc;
      background-image:
        radial-gradient(at 0% 0%, hsla(142, 46%, 34%, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, hsla(199, 89%, 48%, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, hsla(142, 46%, 34%, 0.05) 0px, transparent 50%),
        radial-gradient(at 0% 100%, hsla(199, 89%, 48%, 0.1) 0px, transparent 50%);
    }

    .loading-circle {
      background: conic-gradient(from 0deg, transparent 0%, #2f7f34 20%, transparent 40%);
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .qr-shadow {
      box-shadow: 0 -4px 10px -2px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body
  class="font-sans text-slate-900 bg-slate-50 min-h-screen hero-mesh-gradient flex items-center justify-center py-8">
  <div
    class="w-full max-w-md bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-100 flex flex-col h-[85vh] relative">
    <div class="bg-white border-b border-slate-100 p-4 sticky top-0 z-10 flex items-center justify-between">
      <div class="flex items-center">
        <button class="mr-3 p-1 rounded-full hover:bg-slate-50 text-slate-500">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-lg font-bold text-slate-800">Chờ xác nhận</h1>
      </div>
      <div class="flex items-center space-x-2">
        <span class="material-symbols-outlined text-slate-400">help</span>
      </div>
    </div>
    <div class="flex-1 overflow-y-auto flex flex-col items-center justify-center p-6 relative">
      <div class="relative w-64 h-64 flex items-center justify-center mb-8">
        <div class="absolute inset-0 bg-green-50 rounded-full animate-ping-slow opacity-75"></div>
        <div class="absolute inset-4 bg-green-100 rounded-full animate-pulse opacity-50"></div>
        <div class="absolute inset-0 rounded-full border-4 border-slate-100"></div>
        <div class="absolute inset-0 rounded-full loading-circle opacity-50"></div>
        <div class="absolute inset-1 bg-white rounded-full"></div>
        <div class="relative z-10 text-center flex flex-col items-center">
          <span class="material-symbols-outlined text-4xl text-primary mb-2 animate-bounce">hourglass_top</span>
          <div class="text-4xl font-black text-slate-800 tracking-tight font-mono">14:58</div>
          <p class="text-xs text-slate-400 font-medium mt-1">Thời gian còn lại</p>
        </div>
      </div>
      <div class="text-center mb-10 max-w-[280px]">
        <h2 class="text-xl font-bold text-slate-800 mb-2">Đang gửi yêu cầu...</h2>
        <p class="text-sm text-slate-500 leading-relaxed">
          Hệ thống đang gửi mức giá đấu thầu của bạn đến <span class="font-semibold text-primary">Kho Đại Lý</span>.
        </p>
      </div>
      <div class="w-full bg-slate-50 rounded-xl p-5 border border-slate-100 mb-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
        <div class="flex justify-between items-start mb-4">
          <div>
            <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-1">Kho Đại Lý</p>
            <h3 class="font-bold text-slate-800 text-lg">Kho Phế Liệu An Khang</h3>
          </div>
          <div class="bg-white p-1.5 rounded-lg border border-slate-200 shadow-sm">
            <span class="material-symbols-outlined text-primary">storefront</span>
          </div>
        </div>
        <div class="border-t border-slate-200 pt-3 flex justify-between items-center">
          <div>
            <p class="text-xs text-slate-400 mb-1">Giá đấu thầu của bạn</p>
            <p class="text-xl font-bold text-primary">850.000 <span
                class="text-sm font-semibold text-slate-500">VNĐ</span></p>
          </div>
          <div class="text-right">
            <p class="text-xs text-slate-400 mb-1">Khối lượng</p>
            <p class="text-sm font-bold text-slate-700">3.5 Tấn</p>
          </div>
        </div>
      </div>
      <button
        class="text-slate-400 hover:text-red-500 text-sm font-medium py-2 px-4 rounded-full hover:bg-red-50 transition-colors flex items-center">
        <span class="material-symbols-outlined text-lg mr-1.5">close</span>
        Hủy yêu cầu
      </button>
    </div>
    <div class="bg-white border-t border-slate-200 px-2 pb-2 pt-2">
      <div class="flex justify-between items-end relative">
        <button
          class="flex-1 flex flex-col items-center justify-center py-2 text-slate-400 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl mb-1">home</span>
          <span class="text-[10px] font-medium">Trang chủ</span>
        </button>
        <button class="flex-1 flex flex-col items-center justify-center py-2 text-primary">
          <span class="material-symbols-outlined text-2xl mb-1 font-bold fill-1">local_shipping</span>
          <span class="text-[10px] font-medium font-bold">Chuyến xe</span>
        </button>
        <div class="relative -top-6 px-2">
          <button
            class="w-14 h-14 rounded-full bg-primary text-white flex items-center justify-center shadow-lg shadow-green-900/30 border-4 border-slate-50 qr-shadow transform hover:scale-105 transition-transform">
            <span class="material-symbols-outlined text-2xl">qr_code_scanner</span>
          </button>
        </div>
        <button
          class="flex-1 flex flex-col items-center justify-center py-2 text-slate-400 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl mb-1">notifications</span>
          <span class="text-[10px] font-medium">Thông báo</span>
        </button>
        <button
          class="flex-1 flex flex-col items-center justify-center py-2 text-slate-400 hover:text-primary transition-colors">
          <span class="material-symbols-outlined text-2xl mb-1">person</span>
          <span class="text-[10px] font-medium">Tài khoản</span>
        </button>
      </div>
    </div>
  </div>

</body>

</html>
